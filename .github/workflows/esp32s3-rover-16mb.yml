name: ESP32-S3 N16R8 Rover Build - Custom Partition

on:
  workflow_dispatch:     # 只保留手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Install Prerequisites
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget libncurses-dev flex bison gperf python3 python3-pip python3-venv python3-serial python3-gevent python3-cryptography python3-pyparsing python3-pyelftools cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0
          python3 -m pip install --upgrade pip

      - name: Setup ESP-IDF
        shell: bash
        run: |
          ./Tools/scripts/esp32_get_idf.sh
          cd modules/esp_idf
          ./install.sh esp32,esp32s3
          source ./export.sh
          cd ../..

      - name: Create Custom Partition Table (16MB + 1MB Storage)
        shell: bash
        run: |
          mkdir -p libraries/AP_HAL_ESP32/boards/esp32s3empty
          cat > libraries/AP_HAL_ESP32/boards/esp32s3empty/partitions.csv << EOF
          # Name,   Type, SubType, Offset,   Size,   Flags
          nvs,      data, nvs,     0x9000,   0x6000,
          otadata,  data, ota,     0xf000,   0x2000,
          app0,     app,  factory, 0x10000,  0x500000,
          storage,  data, 0x99,    ,         0x100000,   # 1MB 参数存储区
          EOF

      - name: Build ArduRover
        shell: bash
        run: |
          source modules/esp_idf/export.sh || true
          
          python3 -m pip install --progress-bar off lxml pymavlink MAVProxy pexpect geocoder empy==3.3.4 dronecan "pydantic<2.12"

          ./waf configure --board esp32s3empty --debug

          ./waf rover

          # 复制文件方便下载
          cp build/esp32s3empty/esp-idf_build/ardupilot.bin ./ArduRover.esp32s3empty.16MB.bin
          cp build/esp32s3empty/esp-idf_build/ardupilot.elf ./ArduRover.esp32s3empty.elf
          cp build/esp32s3empty/esp-idf_build/bootloader/bootloader.bin ./bootloader.bin
          cp build/esp32s3empty/esp-idf_build/partition_table/partition-table.bin ./partition-table.bin
          cp build/esp32s3empty/esp-idf_build/flash_project_args ./flash_project_args.txt 2>/dev/null || echo "No flash_project_args" > flash_project_args.txt

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ArduRover-esp32s3-N16R8-Custom
          path: |
            *.bin
            *.elf
            flash_project_args.txt
          retention-days: 30
