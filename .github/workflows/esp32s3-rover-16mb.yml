name: ESP32-S3 N16R8 Rover Build

on:
  push:
    paths-ignore:
      - 'AntennaTracker/**'
      - 'ArduSub/**'
      - 'Blimp/**'
      - 'ArduPlane/**'
      - 'ArduCopter/**'
      - 'libraries/AP_HAL_ChibiOS/**'
      - 'libraries/AP_HAL_SITL/**'
      - '**.md'
      - '.github/**'

  pull_request:
    paths-ignore:
      - 'AntennaTracker/**'
      - 'ArduSub/**'
      - 'Blimp/**'
      - 'ArduPlane/**'
      - 'ArduCopter/**'
      - 'libraries/AP_HAL_ChibiOS/**'
      - 'libraries/AP_HAL_SITL/**'
      - '**.md'
      - '.github/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Install Prerequisites
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget libncurses-dev flex bison gperf python3 python3-pip python3-venv python3-serial python3-gevent python3-cryptography python3-pyparsing python3-pyelftools cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0
          python3 -m pip install --upgrade pip

      - name: Setup ESP-IDF
        shell: bash
        run: |
          ./Tools/scripts/esp32_get_idf.sh
          cd modules/esp_idf
          ./install.sh esp32,esp32s3
          source ./export.sh
          cd ../..

      - name: Build ArduRover for esp32s3empty (16MB N16R8)
        shell: bash
        run: |
          source modules/esp_idf/export.sh || true
          
          python3 -m pip install --progress-bar off lxml pymavlink MAVProxy pexpect geocoder empy==3.3.4 dronecan "pydantic<2.12"

          # 先进行基础 configure
          ./waf configure --board esp32s3empty --debug

          # 重新 configure 并尝试启用更大 Flash 支持（通过环境变量和 board 配置）
          ./waf configure --board esp32s3empty --debug

          echo "=== Building Rover for 16MB Flash ==="
          ./waf rover

          # 复制文件
          cp build/esp32s3empty/esp-idf_build/ardupilot.bin ./ArduRover.esp32s3empty.16MB.bin 2>/dev/null || cp build/esp32s3empty/esp-idf_build/ardupilot.bin ./ArduRover.esp32s3empty.bin
          cp build/esp32s3empty/esp-idf_build/ardupilot.elf ./ArduRover.esp32s3empty.elf 2>/dev/null || true
          cp build/esp32s3empty/esp-idf_build/bootloader/bootloader.bin ./bootloader.bin
          cp build/esp32s3empty/esp-idf_build/partition_table/partition-table.bin ./partition-table.bin
          cp build/esp32s3empty/esp-idf_build/flash_project_args ./flash_project_args.txt 2>/dev/null || echo "No flash_project_args" > flash_project_args.txt

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ArduRover-esp32s3-N16R8
          path: |
            ArduRover*.bin
            ArduRover*.elf
            bootloader.bin
            partition-table.bin
            flash_project_args.txt
          retention-days: 30
